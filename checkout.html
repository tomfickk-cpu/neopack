<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — NeoPack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --matrix-green: #00ff41; --matrix-dim: #003b00; --matrix-glow: rgba(0,255,65,0.3);
  --bg-dark: #0a0a0a; --bg-card: #0d0d0d; --text: #c0c0c0; --text-bright: #e0e0e0;
}
body {
  background: var(--bg-dark); color: var(--text);
  font-family: 'JetBrains Mono', monospace; min-height: 100vh;
}
.container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }

h1 {
  font-family: 'Orbitron', monospace; font-size: 1.8rem; color: var(--matrix-green);
  text-align: center; margin-bottom: 8px; text-shadow: 0 0 30px var(--matrix-glow);
}
.subtitle { text-align: center; color: var(--text); font-size: 0.85rem; margin-bottom: 40px; }

.form-box {
  background: var(--bg-card); border: 1px solid rgba(0,255,65,0.15);
  border-radius: 8px; padding: 40px;
}
.form-group { margin-bottom: 24px; }
.form-group label {
  display: block; font-size: 0.8rem; color: var(--matrix-green); margin-bottom: 8px; font-weight: 600;
}
.form-group input, .form-group select {
  width: 100%; padding: 12px 16px;
  background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2);
  border-radius: 4px; color: var(--text-bright); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
  transition: border-color 0.3s;
}
.form-group input:focus, .form-group select:focus {
  outline: none; border-color: var(--matrix-green); box-shadow: 0 0 15px var(--matrix-glow);
}
.form-group select option { background: var(--bg-dark); color: var(--text); }

.terms-group {
  display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px;
}
.terms-group input[type="checkbox"] {
  width: 20px; height: 20px; margin-top: 2px; accent-color: var(--matrix-green); cursor: pointer;
}
.terms-group label { font-size: 0.8rem; color: var(--text); cursor: pointer; }
.terms-group a { color: var(--matrix-green); }

.price-summary {
  background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.15);
  border-radius: 8px; padding: 20px; margin-bottom: 24px; display: flex;
  justify-content: space-between; align-items: center;
}
.price-label { font-size: 0.9rem; color: var(--text); }
.price-value {
  font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900; color: var(--matrix-green);
}

.btn {
  width: 100%; padding: 16px 32px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s; border: none;
}
.btn-primary {
  background: var(--matrix-green); color: var(--bg-dark); box-shadow: 0 0 30px var(--matrix-glow);
}
.btn-primary:hover { box-shadow: 0 0 60px var(--matrix-glow); transform: translateY(-2px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 16px; background: transparent; color: var(--matrix-green);
  border: 1px solid var(--matrix-green); padding: 12px 24px; font-size: 0.85rem;
  text-decoration: none; border-radius: 4px; transition: all 0.3s; width: auto;
}
.btn-secondary:hover { background: rgba(0,255,65,0.1); }

.steps {
  display: flex; justify-content: center; gap: 40px; margin-bottom: 40px;
}
.step { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
.step-num {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 0.85rem;
}
.step.active .step-num { background: var(--matrix-green); color: var(--bg-dark); }
.step.done .step-num { background: var(--matrix-dim); color: var(--matrix-green); }
.step.pending .step-num { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text); }
.step.active .step-label { color: var(--matrix-green); }
.step.pending .step-label { color: var(--text); opacity: 0.4; }
.step.done .step-label { color: var(--matrix-green); }

.hidden { display: none; }

@media (max-width: 600px) {
  .form-box { padding: 24px; }
  .steps { gap: 16px; }
  .step-label { font-size: 0.65rem; }
  h1 { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="container">
  <a href="index.html" style="color:var(--matrix-green);text-decoration:none;font-size:0.8rem;display:inline-block;margin-bottom:24px;">← Voltar</a>

  <div class="steps" id="steps">
    <div class="step active" id="step1">
      <span class="step-num">1</span>
      <span class="step-label">SEUS DADOS</span>
    </div>
    <div class="step pending" id="step2">
      <span class="step-num">2</span>
      <span class="step-label">PAGAMENTO</span>
    </div>
    <div class="step pending" id="step3">
      <span class="step-num">3</span>
      <span class="step-label">DOWNLOAD</span>
    </div>
  </div>

  <h1>▸ CHECKOUT</h1>
  <p class="subtitle">Preencha seus dados antes de seguir para o pagamento</p>

  <div class="form-box" id="formBox">
    <div class="form-group">
      <label>Plano selecionado</label>
      <select id="planoSelect">
        <option value="pro">NeoPack PRO — R$47 (1 dev, 3 máquinas)</option>
        <option value="enterprise">NeoPack ENTERPRISE — R$147 (devs ilimitados)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Nome completo *</label>
      <input type="text" id="nome" placeholder="Seu nome completo" required>
    </div>

    <div class="form-group">
      <label>E-mail *</label>
      <input type="email" id="email" placeholder="seu@email.com" required>
    </div>

    <div class="form-group">
      <label>WhatsApp</label>
      <input type="tel" id="whatsapp" placeholder="(11) 99999-8888">
    </div>

    <div class="form-group">
      <label>Empresa (opcional)</label>
      <input type="text" id="empresa" placeholder="Sua empresa">
    </div>

    <div class="price-summary">
      <span class="price-label">Total:</span>
      <span class="price-value" id="priceDisplay">R$ 47</span>
    </div>

    <div class="terms-group">
      <input type="checkbox" id="termos">
      <label for="termos">
        Eu, <span id="signatureName">________________________</span>, declaro que li e aceito os
        <a href="termos.html" target="_blank">termos de uso</a> e autorizo o tratamento dos meus dados
        conforme a LGPD. Esta é minha <strong>assinatura digital</strong> para esta compra.
      </label>
    </div>

    <button class="btn btn-primary" id="btnSubmit" disabled>▸ IR PARA PAGAMENTO</button>
    <div style="text-align:center;margin-top:12px;">
      <a href="index.html" class="btn-secondary">← CANCELAR</a>
    </div>
  </div>

  <div class="form-box hidden" id="successBox" style="text-align:center;padding:60px;">
    <div style="font-size:4rem;margin-bottom:16px;">✅</div>
    <h2 style="font-family:'Orbitron',monospace;color:var(--matrix-green);margin-bottom:16px;">CADASTRO REALIZADO!</h2>
    <p style="color:var(--text);margin-bottom:24px;font-size:0.9rem;">
      Redirecionando para o pagamento via Hotmart...
    </p>
    <div style="font-size:0.8rem;color:rgba(255,255,255,0.3);">
      Se não for redirecionado em 5 segundos, <a href="#" id="hotmartLink" style="color:var(--matrix-green);">clique aqui</a>.
    </div>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const planParam = params.get('plano');
  const planoSelect = document.getElementById('planoSelect');
  const priceDisplay = document.getElementById('priceDisplay');
  const nome = document.getElementById('nome');
  const email = document.getElementById('email');
  const termos = document.getElementById('termos');
  const btnSubmit = document.getElementById('btnSubmit');
  const signatureName = document.getElementById('signatureName');
  const formBox = document.getElementById('formBox');
  const successBox = document.getElementById('successBox');
  const hotmartLink = document.getElementById('hotmartLink');

  // Configuração Hotmart — COLE SEU LINK HOTMART AQUI
  const HOTMART_LINKS = {
    pro: '#',       // <-- COLE SEU LINK HOTMART DO PLANO PRO
    enterprise: '#' // <-- COLE SEU LINK HOTMART DO PLANO ENTERPRISE
  };

  if (planParam && HOTMART_LINKS[planParam]) {
    planoSelect.value = planParam;
  }

  function updatePrice() {
    const val = planoSelect.value;
    priceDisplay.textContent = val === 'enterprise' ? 'R$ 147' : 'R$ 47';
  }
  planoSelect.addEventListener('change', updatePrice);
  updatePrice();

  nome.addEventListener('input', function() {
    signatureName.textContent = this.value.trim() || '________________________';
    validateForm();
  });
  email.addEventListener('input', validateForm);
  termos.addEventListener('change', validateForm);

  function validateForm() {
    const valid = nome.value.trim().length >= 3 &&
                  email.value.includes('@') &&
                  termos.checked;
    btnSubmit.disabled = !valid;
  }

  btnSubmit.addEventListener('click', function() {
    if (btnSubmit.disabled) return;

    const plan = planoSelect.value;
    const customer = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2, 6),
      nome: nome.value.trim(),
      email: email.value.trim(),
      whatsapp: document.getElementById('whatsapp').value.trim(),
      empresa: document.getElementById('empresa').value.trim(),
      plano: plan,
      preco: plan === 'enterprise' ? 147 : 47,
      data: new Date().toISOString(),
      pago: false,
      assinatura: nome.value.trim(),
      ip: ''
    };

    // Save to localStorage customer registry
    const customers = JSON.parse(localStorage.getItem('neopack_customers') || '[]');
    customers.push(customer);
    localStorage.setItem('neopack_customers', JSON.stringify(customers));

    // Save current session
    sessionStorage.setItem('neopack_session', JSON.stringify(customer));

    // Update steps
    document.getElementById('step1').className = 'step done';
    document.getElementById('step2').className = 'step active';

    // Show success / redirect
    formBox.classList.add('hidden');
    successBox.classList.remove('hidden');

    const hotmartUrl = HOTMART_LINKS[plan];
    if (hotmartUrl && hotmartUrl !== '#') {
      hotmartLink.href = hotmartUrl;
      setTimeout(function() {
        window.location.href = hotmartUrl;
      }, 3000);
    } else {
      // Demo mode — simulate payment redirect
      hotmartLink.textContent = 'simular pagamento (demo)';
      hotmartLink.href = 'obrigado.html?session=' + customer.id;
      setTimeout(function() {
        window.location.href = 'obrigado.html?session=' + customer.id;
      }, 3000);
    }
  });
})();
</script>
</body>
</html>
