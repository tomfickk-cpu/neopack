<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — NeoPack Clientes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --matrix-green: #00ff41; --matrix-glow: rgba(0,255,65,0.3);
  --bg-dark: #0a0a0a; --bg-card: #0d0d0d; --text: #c0c0c0; --text-bright: #e0e0e0;
}
body {
  background: var(--bg-dark); color: var(--text);
  font-family: 'JetBrains Mono', monospace; min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
h1 {
  font-family: 'Orbitron', monospace; font-size: 1.5rem; color: var(--matrix-green);
  margin-bottom: 8px;
}
.subtitle { color: var(--text); font-size: 0.8rem; margin-bottom: 32px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--bg-card); border: 1px solid rgba(0,255,65,0.1);
  border-radius: 8px; padding: 24px; text-align: center;
}
.stat-value { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 900; color: var(--matrix-green); }
.stat-label { font-size: 0.75rem; color: var(--text); margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th {
  text-align: left; padding: 12px 16px; color: var(--matrix-green);
  font-family: 'Orbitron', monospace; font-size: 0.75rem;
  border-bottom: 2px solid var(--matrix-green);
}
td { padding: 12px 16px; border-bottom: 1px solid rgba(0,255,65,0.08); }
.status-pago { color: var(--matrix-green); font-weight: 700; }
.status-pendente { color: #ffa500; }
.truncate { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.export-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; background: transparent; border: 1px solid var(--matrix-green);
  color: var(--matrix-green); border-radius: 4px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; transition: all 0.3s; margin-bottom: 24px;
}
.export-btn:hover { background: rgba(0,255,65,0.1); }
.actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
@media (max-width: 768px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 0.7rem; }
  th, td { padding: 8px; }
}
@media (max-width: 600px) {
  .stats { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; }
}
</style>
</head>
<body>

<div class="container">
  <div class="actions">
    <h1>▸ CLIENTES</h1>
    <button class="export-btn" onclick="exportCSV()">📥 EXPORTAR CSV</button>
    <button class="export-btn" onclick="clearAll()">🗑️ LIMPAR DADOS</button>
    <a href="index.html" style="color:var(--matrix-green);font-size:0.8rem;margin-left:auto;">← Site</a>
  </div>
  <p class="subtitle" id="subtitle">Gerenciamento de assinaturas e clientes</p>

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="stat-value" id="totalClientes">0</div><div class="stat-label">Total Clientes</div></div>
    <div class="stat-card"><div class="stat-value" id="totalPagos">0</div><div class="stat-label">Pagamentos Confirmados</div></div>
    <div class="stat-card"><div class="stat-value" id="totalPRO">0</div><div class="stat-label">Planos PRO</div></div>
    <div class="stat-card"><div class="stat-value" id="totalEnterprise">0</div><div class="stat-label">Planos Enterprise</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>DATA</th>
          <th>NOME</th>
          <th>E-MAIL</th>
          <th>WHATSAPP</th>
          <th>EMPRESA</th>
          <th>PLANO</th>
          <th>VALOR</th>
          <th>STATUS</th>
          <th>ASSINATURA</th>
          <th>DOWNLOAD</th>
        </tr>
      </thead>
      <tbody id="tbody">
      </tbody>
    </table>
  </div>
  <p style="margin-top:24px;font-size:0.7rem;color:rgba(255,255,255,0.2);">
    © 2026 NeoPack — Dados armazenados localmente (localStorage)
  </p>
</div>

<script>
function render() {
  const customers = JSON.parse(localStorage.getItem('neopack_customers') || '[]');
  const tbody = document.getElementById('tbody');

  document.getElementById('totalClientes').textContent = customers.length;
  document.getElementById('totalPagos').textContent = customers.filter(c => c.pago).length;
  document.getElementById('totalPRO').textContent = customers.filter(c => c.plano === 'pro').length;
  document.getElementById('totalEnterprise').textContent = customers.filter(c => c.plano === 'enterprise').length;

  if (customers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">Nenhum cliente cadastrado ainda</td></tr>';
    return;
  }

  // Sort by date descending
  customers.sort((a, b) => new Date(b.data) - new Date(a.data));

  tbody.innerHTML = customers.map(c => `
    <tr>
      <td style="font-size:0.7rem;">${new Date(c.data).toLocaleDateString('pt-BR')}</td>
      <td><strong>${c.nome}</strong></td>
      <td class="truncate">${c.email}</td>
      <td>${c.whatsapp || '—'}</td>
      <td>${c.empresa || '—'}</td>
      <td style="color:var(--matrix-green);font-weight:700;">${c.plano.toUpperCase()}</td>
      <td>R$${c.preco}</td>
      <td class="${c.pago ? 'status-pago' : 'status-pendente'}">${c.pago ? '✓ PAGO' : '⏳ PENDENTE'}</td>
      <td style="font-size:0.7rem;color:var(--matrix-green);">${c.assinatura}</td>
      <td>${c.dataDownload ? new Date(c.dataDownload).toLocaleDateString('pt-BR') : '—'}</td>
    </tr>
  `).join('');
}

function exportCSV() {
  const customers = JSON.parse(localStorage.getItem('neopack_customers') || '[]');
  if (customers.length === 0) { alert('Nenhum cliente para exportar'); return; }
  const headers = ['Data', 'Nome', 'Email', 'WhatsApp', 'Empresa', 'Plano', 'Valor', 'Status', 'Assinatura', 'Data Download'];
  const rows = customers.map(c => [
    new Date(c.data).toLocaleDateString('pt-BR'),
    c.nome, c.email, c.whatsapp, c.empresa,
    c.plano.toUpperCase(), `R$${c.preco}`,
    c.pago ? 'PAGO' : 'PENDENTE',
    c.assinatura,
    c.dataDownload ? new Date(c.dataDownload).toLocaleDateString('pt-BR') : ''
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'neopack-clientes.csv';
  link.click();
}

function clearAll() {
  if (confirm('Tem certeza? Isso apagará TODOS os dados de clientes.')) {
    if (confirm('CONFIRMAR: apagar todos os dados?')) {
      localStorage.removeItem('neopack_customers');
      render();
    }
  }
}

render();
</script>
</body>
</html>
